<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rouge Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>Rouge</h1>
          <p>数据驱动原型：滚筒战斗、技能候选、波次推进</p>
        </div>
        <div class="hint">
          <span>移动: WASD</span>
          <span>装备候选: Q / E</span>
          <span>释放技能: Z / C</span>
          <span>商店购买: 1 / 2 / 3</span>
        </div>
      </header>

      <main class="layout">
        <aside class="hud-panel" id="hud-panel"></aside>
        <section class="battle-panel">
          <canvas id="game-canvas" width="960" height="640"></canvas>
          <div id="overlay-root" class="overlay-root"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
